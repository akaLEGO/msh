<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ms.H — Flower Match</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" />

<style>
  html, body { margin: 0; padding: 0; background: #f5f0e8; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(ellipse at 20% 20%, #f4ebe0 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, #ece4d3 0%, transparent 50%),
      #f5f0e8;
    display: flex; align-items: center; justify-content: center;
  }
  #root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }

  @keyframes msh-bob {
    0%, 100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-4px) rotate(1deg); }
  }
  @keyframes msh-fadein {
    from { opacity: 0; transform: translateY(8px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes msh-pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .phone-scroll::-webkit-scrollbar { display: none; }
  * { scrollbar-width: none; }
  button { font: inherit; }
  button:focus { outline: none; }

  /* Brand mark — masthead */
  .msh-masthead {
    position: fixed; top: 32px; left: 40px; z-index: 5;
    font-family: 'Cormorant Garamond', serif; font-size: 18px; color: #2a241e;
    letter-spacing: 0.2px; display: flex; flex-direction: column; gap: 4px;
  }
  .msh-masthead-title { font-style: italic; }
  .msh-masthead-sub { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; color: #8a7e6a; letter-spacing: 2.5px; text-transform: uppercase; }

  /* Phone wrapper shadow */
  .msh-phone-stage {
    position: relative; filter: drop-shadow(0 30px 80px rgba(60, 40, 20, 0.15));
  }

  /* Decorative side label */
  .msh-side-label {
    position: fixed; right: 32px; top: 50%; transform: translateY(-50%) rotate(90deg);
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; color: #8a7e6a;
    letter-spacing: 3px; text-transform: uppercase; pointer-events: none;
  }

  /* Bottom watermark */
  .msh-foot {
    position: fixed; bottom: 28px; left: 0; right: 0; text-align: center;
    font-family: 'Cormorant Garamond', serif; font-size: 11px; color: #8a7e6a;
    font-style: italic; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="msh-masthead">
  <div class="msh-masthead-title">Ms<span style="color: #c46a3a;">.</span>H</div>
  <div class="msh-masthead-sub">Editorial · 01 / 01</div>
</div>
<div class="msh-side-label">FLOWER MATCH · MAY 2026</div>
<div class="msh-foot">— Tap "Find my match" or pick a flower by sight —</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="themes.jsx"></script>
<script type="text/babel" src="flowers.jsx"></script>
<script type="text/babel" src="screens1.jsx"></script>
<script type="text/babel" src="screens2.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel">
const PHONE_W = 390;
const PHONE_H = 820;

function App() {
  return (
    <div className="msh-phone-stage">
      <IOSDevice width={PHONE_W} height={PHONE_H} dark={false}>
        <FlowerApp theme={THEMES.editorial} />
      </IOSDevice>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
